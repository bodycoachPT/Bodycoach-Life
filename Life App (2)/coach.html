  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ck: #1A1A20;\n  --red-tint: #F7E8E9;\n  --heading:  'Jost', sans-serif;\n  --body:     'DM Sans', sans-serif;\n  --green:    #16a34a;\n  --green-bg: #f0fdf4;\n  --green-bd: #bbf7d0;\n  --amber:    #d97706;\n  --amber-bg: #fffbeb;\n  --amber-bd: #fde68a;\n  --red:      #B81E2A;\n  --red-bg:   #F7E8E9;\n  --red-bd:   #f0c8cb;\n  --shadow:   0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);\n  --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 12px 32px rgba(0,0,0,.05);\n}\n\n*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }\nbody { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }\nbutton { cursor:pointer; border:none; background:none; font-family:'DM Sans',sans-serif; }\ninput, select, textarea { font-family:'DM Sans',sans-serif; }\n\n/* \u2500\u2500 AUTH SCREEN \u2500\u2500 */\n#auth-screen {\n  position:fixed; inset:0; z-index:100;\n  background:linear-gradient(160deg,#1A1A20 0%,#2C2C34 100%);\n  display:flex; flex-direction:column; align-items:center; justify-content:center;\n  padding:32px;\n}\n#auth-screen.hidden { display:none; }\n\n/* \u2500\u2500 LAYOUT \u2500\u2500 */\n#app { display:none; min-height:100vh; }\n#app.visible { display:block; }\n\n.page-header {\n  background:var(--surface); border-bottom:1px solid var(--border);\n  padding:20px 32px; display:flex; align-items:center; justify-content:space-between;\n  position:sticky; top:0; z-index:50;\n}\n.page-content { max-width:1100px; margin:0 auto; padding:28px 32px; }\n\n@media(max-width:600px) {\n  .page-header { padding:16px; }\n  .page-content { padding:16px; }\n}\n\n/* \u2500\u2500 CARDS \u2500\u2500 */\n.card {\n  background:var(--surface); border:1px solid var(--border);\n  border-radius:16px; padding:20px; box-shadow:var(--shadow);\n  margin-bottom:16px;\n}\n.card-sm { padding:14px 16px; border-radius:12px; }\n\n/* \u2500\u2500 CLIENT LIST \u2500\u2500 */\n.client-card {\n  background:var(--surface); border:1px solid var(--border);\n  border-radius:14px; padding:16px 18px; margin-bottom:10px;\n  cursor:pointer; transition:box-shadow .15s, border-color .15s;\n  display:flex; align-items:center; gap:14px;\n}\n.client-card:hover { box-shadow:var(--shadow-md); border-color:var(--border2); }\n.client-card.active { border-color:var(--brand); box-shadow:0 0 0 2px rgba(10,10,10,.06); }\n\n/* \u2500\u2500 TABS \u2500\u2500 */\n.tabs { display:flex; gap:6px; margin-bottom:20px; }\n.tab-btn {\n  padding:8px 16px; border-radius:9px; font-size:13px; font-weight:600;\n  color:var(--muted); background:transparent; transition:.15s; white-space:nowrap;\n}\n.tab-btn.active { background:var(--brand); color:#fff; }\n.tab-btn:hover:not(.active) { background:var(--faint); color:var(--text); }\n\n/* \u2500\u2500 FORM \u2500\u2500 */\n.form-group { margin-bottom:14px; }\n.form-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:5px; display:block; }\n.form-input {\n  width:100%; padding:10px 12px; border:1px solid var(--border2); border-radius:9px;\n  font-size:14px; color:var(--text); background:var(--surface); outline:none;\n  transition:border-color .15s;\n}\n.form-input:focus { border-color:var(--brand); }\n\n/* \u2500\u2500 STAT PILL \u2500\u2500 */\n.stat-pill {\n  display:inline-flex; align-items:center; gap:6px; padding:4px 10px;\n  border-radius:20px; font-size:11px; font-weight:600;\n}\n\n/* \u2500\u2500 GRID \u2500\u2500 */\n.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }\n.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }\n@media(max-width:480px) { .grid-2,.grid-3 { grid-template-columns:1fr; } }\n\n/* \u2500\u2500 MODAL \u2500\u2500 */\n#modal-backdrop {\n  position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200;\n  display:none; align-items:center; justify-content:center;\n  padding:20px;\n}\n#modal-backdrop.open { display:flex; }\n#modal-box {\n  background:var(--surface); border-radius:18px; padding:24px;\n  width:100%; max-width:560px; max-height:88vh; overflow-y:auto;\n}\n@media(min-width:600px) {\n  #modal-backdrop { padding:24px; }\n  #modal-box { max-height:84vh; }\n}\n\n/* \u2500\u2500 EMPTY STATE \u2500\u2500 */\n.empty { text-align:center; padding:60px 20px; color:var(--muted); }\n.empty-title { font-size:16px; font-weight:600; color:var(--text); margin-bottom:8px; }\n.empty-sub { font-size:13px; line-height:1.6; }\n\n/* \u2500\u2500 TOAST \u2500\u2500 */\n#toast {\n  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);\n  background:#2C2C34; color:#fff; padding:10px 20px; border-radius:10px;\n  font-size:12px; font-weight:600; z-index:500; display:none;\n  white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.3);\n}\n<\/style>\n<\/head>\n<body>\n\n<!-- \u2550\u2550 AUTH SCREEN \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"auth-screen\">\n  <div style=\"text-align:center;margin-bottom:44px\">\n    <div style=\"display:inline-flex;align-items:center;gap:11px;margin-bottom:12px\">\n      <span style=\"font-size:34px;font-weight:300;letter-spacing:-.01em;font-family:'Jost',sans-serif;line-height:1\"><span style=\"color:#fff\">Body<\/span><span style=\"color:#E8707A\">coach<\/span><\/span>\n      <span style=\"font-family:'DM Sans',sans-serif;font-weight:600;font-size:12px;letter-spacing:.18em;color:#fff;background:#B81E2A;padding:6px 11px;border-radius:100px;line-height:1\">COACH<\/span>\n    <\/div>\n    <div style=\"font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.3em;text-transform:uppercase;margin-top:4px\">DASHBOARD<\/div>\n  <\/div>\n  <div style=\"text-align: ht:1.5\">Demo mode shows sample clients only.<br>Connect Google before launch to see real data.<\/div>\n  <\/div>\n<\/div>\n\n<!-- \u2550\u2550 MAIN APP \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"app\">\n\n  <!-- Header -->\n  <div class=\"page-header\">\n    <div style=\"display:flex;align-items:center;gap:14px\">\n      <div style=\"display:flex;align-items:center;gap:9px\">\n        <span style=\"font-size:22px;font-weight:300;letter-spacing:-.01em;font-family:'Jost',sans-serif;line-height:1\"><span style=\"color:#2C2C34\">Body<\/span><span style=\"color:#B81E2A\">coach<\/span><\/span>\n        <span style=\"font-family:'DM Sans',sans-serif;font-weight:600;font-size:10px;letter-spacing:.18em;color:#fff;background:#B81E2A;padding:4px 9px;border-radius:100px;line-height:1\">COACH<\/span>\n      <\/div>\n    <\/div>\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <div id=\"coach-user-info\" style=\"font-size:12px;color:var(--muted);font-weight:600\"><\/div>\n      <button onclick=\"coachSignOut()\" style=\"padding:7px 12px;border-radius:8px;border:1px solid var(--border2);font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap\">Sign Out<\/button>\n    <\/div>\n  <\/div>\n\n  <!-- Content -->\n  <div class=\"page-content\">\n\n    <!-- Loading state -->\n    <div id=\"loading-state\" style=\"text-align:center;padding:60px 20px\">\n      <div style=\"font-size:13px;color:var(--muted);font-weight:600\">Loading clients...<\/div>\n    <\/div>\n\n    <!-- No clients state -->\n    <div id=\"no-clients-state\" style=\"display:none\">\n      <div class=\"empty\">\n        <div class=\"empty-title\">No clients yet<\/div>\n        <div class=\"empty-sub\">When clients sign in with Google and sync to the shared folder, they'll appear here automatically.<br><br>Make sure <strong>GD_FOLDER_ID<\/strong> in this file matches the one in index.html.<\/div>\n      <\/div>\n    <\/div>\n\n    \n    <!-- Section nav (shown when signed in) -->\n    <div id=\"section-nav\" style=\"display:none;margin-bottom:20px\">\n      <div style=\"display:flex;gap:4px;background:var(--faint);border:1px solid var(--border);border-radius:12px;padding:4px;width:fit-content\">\n        <button class=\"section-btn active\" data-section=\"clients\" onclick=\"switchSection('clients')\" style=\"padding:8px 20px;border-radius:9px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)\">Clients<\/button>\n        <button class=\"section-btn\" data-section=\"workouts\" onclick=\"switchSection('workouts')\" style=\"padding:8px 20px;border-radius:9px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:transparent;color:var(--muted)\">Workouts<\/button>\n        <button class=\"section-btn\" data-section=\"messages\" onclick=\"switchSection('messages')\" style=\"padding:8px 20px;border-radius:9px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:transparent;color:var(--muted)\">Messages<\/button>\n      <\/div>\n    <\/div>\n\n    <!-- Workouts panel -->\n    <div id=\"workouts-panel\" style=\"display:none\"><\/div>\n\n    <!-- Messages panel -->\n    <div id=\"messages-panel\" style=\"display:none\"><\/div>\n\n<!-- Main grid: client list + detail panel -->\n    <div id=\"main-grid\" style=\"display:none;display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start\">\n\n      <!-- Client list -->\n      <div>\n        <div style=\"font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px\">Clients (<span id=\"client-count\">0<\/span>)<\/div>\n        <div style=\"margin-bottom:10px\">\n          <input type=\"search\" id=\"client-search\" placeholder=\"Search clients...\" oninput=\"filterClients(this.value)\" style=\"width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:10px;font-size:13px;outline:none;background:var(--surface)\">\n        <\/div>\n        <div id=\"client-list\"><\/div>\n      <\/div>\n\n      <!-- Detail panel -->\n      <div id=\"detail-panel\">\n        <div class=\"empty\" style=\"background:var(--surface);border:1px solid var(--border);border-radius:16px\">\n          <div class=\"empty-title\">Select a client<\/div>\n          <div class=\"empty-sub\">Choose a client from the list to view their week summary and push updates.<\/div>\n        <\/div>\n      <\/div>\n\n    <\/div>\n\n  <\/div>\n<\/div>\n\n<!-- \u2550\u2550 MODAL \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"modal-backdrop\" onclick=\"if(event.target===this)closeModal()\">\n  <div id=\"modal-box\">\n    <div id=\"modal-content\"><\/div>\n  <\/div>\n<\/div>\n\n<!-- \u2550\u2550 TOAST \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"toast\"><\/div>\n\n<script>\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255 550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nvar Coach = {\n  token:    null,\n  user:     null,\n  clients:  [],      // array of {email, name, fileId, asgFileId, data, lastSync}\n  selected: null,    // currently viewed client email\n  view:     'week',   // 'week' | 'targets' | 'routine' | 'notes' | 'medical'\n  section:  'clients' // 'clients' | 'workouts' | 'messages'\n};\nvar _tokenClient = null;\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// AUTH\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction coachSignIn() {\n  var btn   = document.getElementById('coach-signin-btn');\n  var errEl = document.getElementById('coach-auth-error');\n  if (btn) btn.textContent = 'Connecting...';\n  if (errEl) errEl.style.display = 'none';\n  _getToken(false, function(ok) {\n    if (ok) {\n      document.getElementById('auth-screen').classList.add('hidden');\n      document.getElementById('app').classList.add('visible');\n      var ui = document.getElementById('coach-user-info');\n      if (ui && Coach.user) ui.textContent = Coach.user.email;\n      loadClients();\n    } else {\n      if (btn) btn.textContent = 'Continue with Google';\n      if (errEl) { errEl.textContent = 'Sign in failed. Please try again.'; errEl.style.display = 'block'; }\n    }\n  });\n}\n\nfunction coachSignOut() {\n  Coach.token = null; Coach.user = null;\n  document.getElementById('app').classList.remove('visible');\n  document.getElementById('auth-screen').classList.remove('hidden');\n}\n\nfunction _getToken(silent, callback) {\n  if (!_tokenClient) {\n    _waitForGIS(function() {\n      _tokenClient = google.accounts.oauth2.initTokenClient({\n        client_id: GD_CLIENT_ID,\n        scope: GD_SCOPE,\n        callback: function(resp) {\n          if (resp.error || !resp.access_token) { if (callback) callback(false); return; }\n          Coach.token = resp.access_token;\n          if (!Coach.user) {\n            fetch('https://www.googleapis.com/oauth2/v3/userinfo', {\n              headers: { Authorization: 'Bearer ' + Coach.token }\n            }).then(r => r.json()).then(function(info) {\n              Coach.user = { email: info.email, name: info.name };\n              if (callback) callback(true);\n            }).catch(function() { if (callback) callback(false); });\n          } else {\n            if (callback) callback(true);\n          }\n        },\n        error_callback: function() { if (callback) callback(false); }\n      });\n      _tokenClient.requestAccessToken({ prompt: silent ? '' : 'consent' });\n    });\n  } else {\n    _tokenClient.requestAccessToken({ prompt: silent ? '' : 'consent' });\n  }\n}\n\nfunction _waitForGIS(cb) {\n  if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) { cb(); return; }\n  setTimeout(function() { _waitForGIS(cb); }, 200);\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// DRIVE API\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nasync function _fetch(url, opts) {\n  opts = opts || {};\n  opts.headers = Object.assign({ Authorization: 'Bearer ' + Coach.token }, opts.headers || {});\n  return fetch(url, opts);\n}\n\nasync function _fetchJSON(url, opts) {\n  var r = await _fetch(url, opts);\n  return r.json();\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// DEMO MODE \u2014 preview the dashboard without Google auth (sample data only)\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction enterDemoMode() {\n  Coach.demo = true;\n  document.getElementById('auth-screen').classList.add('hidden');\n  document.getElementById('app').classList.add('visible');\n  var ui = document.getElementById('coach-user-info');\n  if (ui) ui.textContent = 'Demo mode';\n  document.getElementById('loading-state').style.display = 'none';\n  document.getElementById('no-clients-state').style.display = 'none';\n  document.getElementById('main-grid').style.display = 'grid';\n  document.getElementById('section-nav').style.display = 'block';\n  switchSection('clients');\n\n  function buildData(seed) {\n    var data = { nutrition:{calories:{},protein:{},water:{}}, exercise:{steps:{},burned:{},workout:{}}, lifestyle:{sleep:{}} };\n    var today = new Date();\n    for (var i = 6; i >= 0; i--) {\n      var d = new Date(today); d.setDate(today.getDate() - i);\n      var ds = d.toISOString().slice(0,10);\n      var r = function(min,max){ return Math.round(min + ((Math.sin(seed + i*1.7)+1)/2) * (max-min)); };\n      data.nutrition.calories[ds] = r(1500, 2100);\n      data.nutrition.protein[ds]  = r(110, 165);\n      data.nutrition.water[ds]    = r(1600, 2600);\n      data.exercise.steps[ds]     = r(6500, 12500);\n      data.exercise.burned[ds]    = r(350, 720);\n      data.exercise.workout[ds]   = (i + seed) % 2 === 0;\n      data.lifestyle.sleep[ds]    = (6.4 + ((Math.sin(seed + i)+1)/2) * 2).toFixed(1);\n    }\n    return data;\n  }\n  function client(name, email, seed, hrsAgo, goals, profile) {\n    return {\n      email: email, name: name, fileId: 'demo-' + seed, asgFileId: null,\n      lastSync: new Date(Date.now() - hrsAgo*3600000).toISOString(),\n      payload: { data: {\n        bcl_v2: JSON.stringify(buildData(seed)),\n        bcl_goals_v2: JSON.stringify(goals),\n        bcl_profile: JSON.stringify(profile)\n      }}\n    };\n  }\n  Coach.clients = [\n    client('Sarah Jenkins', 'sarah.jenkins@gmail.com', 1, 1,\n      [{title:'Lose 5kg',current:3.2,target:5},{title:'Run 10k',current:7,target:10},{title:'Hit protein daily',current:5,target:7}],\n      {name:'Sarah Jenkins',tgt_steps:10000,tgt_calories:1900,tgt_burned:500,tgt_protein:150,tgt_water:2500,tgt_sleep:8}),\n    client('Mike Roberts', 'mike.roberts@gmail.com', 2, 5,\n      [{title:'Gain muscle',current:1.5,target:4},{title:'Bench 100kg',current:82,target:100}],\n      {name:'Mike Roberts',tgt_steps:8000,tgt_calories:2600,tgt_burned:400,tgt_protein:180,tgt_water:3000,tgt_sleep:7.5}),\n    client('Emma Walsh', 'emma.walsh@gmail.com', 4, 26,\n      [{title:'Lose body fat',current:2,target:6}],\n      {name:'Emma Walsh',tgt_steps:12000,tgt_calories:1700,tgt_burned:550,tgt_protein:130,tgt_water:2200,tgt_sleep:8}),\n    { email:'tom.byrne@gmail.com', name:'Tom Byrne', fileId:'demo-5', asgFileId:null,\n      lastSync:new Date(Date.now() - 72*3600000).toISOString(), payload:{ data:{} } }\n  ];\n  document.getElementById('client-count').textContent = Coach.clients.length;\n  renderClientList(Coach.clients);\n  selectClient('sarah.jenkins@gmail.com');\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// CLIENT LOADING\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nasync function loadClients() {\n  if (Coach.demo) { enterDemoMode(); return; }\n  document.getElementById('loading-state').style.display = 'block';\n  document.getElementById('main-grid').style.display = 'none';\n  document.getElementById('no-clients-state').style.display = 'none';\n\n  try {\n    // List all files in the shared folder\n    var q   = \"'\" + GD_FOLDER_ID + \"' in parents and trashed=false and name contains 'bcl_'\";\n    var url = 'https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q)\n            + '&fields=files(id,name,modifiedTime)&pageSize=200&orderBy=name';\n    var d   = await _fetchJSON(url);\n    var files = d.files || [];\n\n    // Separate data files from assignment files\n    var dataFiles = files.filter(function(f) { return f.name.endsWith('_data.json'); });\n    var asgFiles  = files.filter(function(f) { return f.name.endsWith('_assignments.json'); });\n\n    if (dataFiles.length === 0) {\n      document.getElementById('loading-state').style.display = 'none';\n      document.getElementById('no-clients-state').style.display = 'block';\n      return;\n    }\n\n    // Load each client's data file\n    var clients = [];\n    for (var i = 0; i < dataFiles.length; i++) {\n      var file = dataFiles[i];\n      try {\n        var r    = await _fetch('https://www.googleapis.com/drive/v3/files/' + file.id + '?alt=media');\n        var text = await r.text();\n        var payload = text && text.trim().length > 5 ? JSON.parse(text) : null;\n        var email  = payload && payload.email ? payload.email : file.name.replace(/^bcl_/, '').replace(/_data\\.json$/, '').replace(/_/g,'.');\n        var asgF   = asgFiles.find(function(af) { return af.name.includes(email.replace(/[^a-z0-9]/gi,'_').toLowerCase()); });\n        // Extract profile name\n        var profile = {};\n        try { profile = JSON.parse((payload && payload.data && payload.data.bcl_profile) || '{}'); } catch(e) {}\n        clients.push({\n          email:     email,\n          name:      profile.name || email,\n          fileId:    file.id,\n          asgFileId: asgF ? asgF.id : null,\n          lastSync:  file.modifiedTime,\n          payload:   payload\n        });\n      } catch(e) {\n        console.warn('Error loading client file:', file.name, e);\n      }\n    }\n\n    Coach.clients = clients;\n    document.getElementById('loading-state').style.display = 'none';\n    document.getElementById('main-grid').style.display = 'grid';\n    document.getElementById('section-nav').style.display = 'block';\n    document.getElementById('client-count').textContent = clients.length;\n    renderClientList(clients);\n\n  } catch(e) {\n    console.error('loadClients error:', e);\n    document.getElementById('loading-state').innerHTML = '<div style=\"color:var(--red);font-size:13px;font-weight:600\">Error loading clients: ' + (e.message||e) + '<\/div>';\n  }\n}\n\nfunction renderClientList(clients) {\n  var el = document.getElementById('client-list');\n  if (!el) return;\n  if (clients.length === 0) { el.innerHTML = '<div style=\"font-size:13px;color:var(--muted);padding:12px 0\">No results<\/div>'; return; }\n  el.innerHTML = clients.map(function(c) {\n    var ago     = _relativeTime(c.lastSync);\n    var isActive = c.email === Coach.selected;\n    return '<div class=\"client-card' + (isActive?' active':'') + '\" onclick=\"selectClient(\\'' + c.email + '\\')\">'\n      + '<div style=\"width:38px;height:38px;border-radius:50%;background:#2C2C34;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#fff\">'\n      + (c.name ? c.name[0].toUpperCase() : '?') + '<\/div>'\n      + '<div style=\"flex:1;min-width:0\">'\n      + '<div style=\"font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">' + c.name + '<\/div>'\n      + '<div style=\"font-size:10px;color:var(--muted)\">Last sync: ' + ago + '<\/div>'\n      + '<\/div>'\n      + '<\/div>';\n  }).join('');\n}\n\nfunction filterClients(query) {\n  var q = query.toLowerCase().trim();\n  var filtered = q ? Coach.clients.filter(function(c) {\n    return c.name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q);\n  }) : Coach.clients;\n  renderClientList(filtered);\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// CLIENT DETAIL\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction selectClient(email) {\n  Coach.selected = email;\n  Coach.view = 'week';\n  // Refresh active state in list\n  document.querySelectorAll('.client-card').forEach(function(el) {\n    el.classList.toggle('active', el.textContent.includes(email) || el.onclick.toString().includes(email));\n  });\n  renderClientList(Coach.clients); // re-render to update active\n  renderDetail();\n}\n\nfunction getClient() {\n  return Coach.clients.find(function(c) { return c.email === Coach.selected; });\n}\n\nfunction renderDetail() {\n  var client = getClient();\n  var panel  = document.getElementById('detail-panel');\n  if (!client || !panel) return;\n\n  panel.innerHTML = ''\n    + '<div style=\"margin-bottom:16px\">'\n    // Client header\n    + '<div class=\"card\" style=\"margin-bottom:12px;background:#B81E2A;color:#fff\">'\n    + '<div style=\"display:flex;align-items:center;gap:14px\">'\n    + '<div style=\"width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500\">'\n    + (client.name ? client.name[0].toUpperCase() : '?') + '<\/div>'\n    + '<div style=\"flex:1\">'\n    + '<div style=\"font-size:18px;font-weight:500\">' + client.name + '<\/div>'\n    + '<div style=\"font-size:12px;color:rgba(255,255,255,.6)\">' + client.email + ' \u00b7 Last sync: ' + _relativeTime(client.lastSync) + '<\/div>'\n    + '<\/div>'\n    + '<button onclick=\"loadClients()\" style=\"padding:7px 12px;border-radius:9px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-size:11px;font-weight:600\">Refresh<\/button>'\n    + '<\/div><\/div>'\n    // Tabs\n    + '<div class=\"tabs\">'\n    + tabBtn('week',    'This Week')\n    + tabBtn('history', 'History')\n    + tabBtn('targets', 'Set Targets')\n    + tabBtn('routine', 'Push Routine')\n    + tabBtn('library', 'Library')\n    + tabBtn('notes', 'Notes')\n    + tabBtn('medical', 'Medical')\n    + '<\/div>'\n    // Tab content\n    + '<div id=\"tab-content\">' + renderTabContent() + '<\/div>'\n    + '<\/div>';\n}\n\nfunction tabBtn(view, label) {\n  return '<button class=\"tab-btn' + (Coach.view===view?' active':'') + '\" onclick=\"switchView(\\'' + view + '\\')\">' + label + '<\/button>';\n}\n\nfunction switchView(view) {\n  Coach.view = view;\n  var tc = document.getElementById('tab-content');\n  if (tc) tc.innerHTML = renderTabContent();\n  // Update tab active states\n  document.querySelectorAll('.tab-btn').forEach(function(btn) {\n    btn.classList.toggle('active', btn.onclick.toString().includes(\"'\" + view + \"'\"));\n  });\n}\n\nfunction renderTabContent() {\n  if (Coach.view === 'week')    return renderWeekSummary();\n  if (Coach.view === 'history') return renderHistoryPanel();\n  if (Coach.view === 'targets') return renderTargetsForm();\n  if (Coach.view === 'routine') return renderRoutinePanel();\n  if (Coach.view === 'library') return renderLibraryPanel();\n  if (Coach.view === 'notes')   return renderNotesPanel();\n  if (Coach.view === 'medical') return renderMedicalPanel();\n  return '';\n}\n\n// \u2500\u2500 Week Summary \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\nfunction renderHistoryPanel() {\n  var client = getClient();\n  if (!client) return '<div style=\"padding:20px;color:var(--muted)\">No client selected<\/div>';\n\n  // Parse sessions from payload\n  var sessions = [];\n  try {\n    var raw = client.payload && client.payload.data && client.payload.data.bcl_sessions_v1;\n    sessions = raw ? JSON.parse(raw) : [];\n  } catch(e) { sessions = []; }\n\n  // Sort newest first, take last 20\n  sessions = sessions.slice().sort(function(a,b) {\n    return (b.completedAt||b.date||'') > (a.completedAt||a.date||'') ? 1 : -1;\n  }).slice(0, 20);\n\n  if (!sessions.length) {\n    return '<div style=\"padding:24px 0;text-align:center\">'\n      + '<div style=\"font-size:32px;margin-bottom:8px\">\ud83d\udccb<\/div>'\n      + '<div style=\"font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px\">No sessions yet<\/div>'\n      + '<div style=\"font-size:12px;color:var(--muted)\">Sessions will appear here once ' + (client.name||'the client') + ' logs a workout<\/div>'\n      + '<\/div>';\n  }\n\n  function fmtSet(set, type) {\n    if (type === 'distance_time') return (set.km||0) + 'km \u00b7 ' + (set.mins||0) + 'min';\n    if (type === 'time') return (set.secs ? Math.round(set.secs/60)+'min' : (set.mins||0)+'min');\n    if (type === 'bodyweight_reps') return (set.reps||0) + ' reps';\n    return (set.reps||0) + ' reps' + (set.kg ? ' @ ' + set.kg + 'kg' : '');\n  }\n\n  var html = '<div style=\"display:flex;flex-direction:column;gap:10px;padding-top:4px\">';\n\n  sessions.forEach(function(s) {\n    var d = s.completedAt ? new Date(s.completedAt) : (s.date ? new Date(s.date) : null);\n    var dateLabel = d ? d.toLocaleDateString('en-IE', {weekday:'short', day:'numeric', month:'short'}) : s.date || '';\n    var timeLabel = d && s.completedAt ? d.toLocaleTimeString('en-IE', {hour:'2-digit', minute:'2-digit'}) : '';\n\n    var exHtml = '';\n    if (s.exercises && s.exercises.length) {\n      exHtml = '<div style=\"margin-top:8px;display:flex;flex-direction:column;gap:4px\">'\n        + s.exercises.map(function(e) {\n            var doneSets = (e.sets||[]).filter(function(st){ return st.done !== false; });\n            if (!doneSets.length) return '';\n            var setStr = doneSets.map(function(st){ return fmtSet(st, e.type); }).join(' \u00b7 ');\n            return '<div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;border-bottom:1px solid var(--border)\">'\n              + '<div style=\"font-size:12px;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">' + e.name + '<\/div>'\n              + '<div style=\"font-size:11px;color:var(--muted);margin-left:8px;white-space:nowrap\">' + setStr + '<\/div>'\n              + '<\/div>';\n          }).filter(Boolean).join('')\n        + '<\/div>';\n    }\n\n    html += '<div class=\"card\" style=\"padding:12px 14px\">'\n      + '<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:2px\">'\n      + '<div style=\"font-size:13px;font-weight:600;color:var(--text)\">' + (s.name||'Workout') + '<\/div>'\n      + '<div style=\"display:flex;gap:6px;align-items:center\">'\n      + (s.duration ? '<span style=\"font-size:11px;color:var(--muted)\">' + s.duration + ' min<\/span>' : '')\n      + (s.burned ? '<span style=\"font-size:11px;background:var(--red-bg);color:var(--red);padding:2px 7px;border-radius:20px;font-weight:600\">' + s.burned + ' kcal<\/span>' : '')\n      + '<\/div><\/div>'\n      + '<div style=\"font-size:11px;color:var(--muted);margin-bottom:4px\">'\n      + dateLabel + (timeLabel ? ' \u00b7 ' + timeLabel : '') + '<\/div>'\n      + exHtml\n      + '<\/div>';\n  });\n\n  html += '<\/div>';\n  return html;\n}\n\nfunction renderWeekSummary() {\n  var client  = getClient();\n  if (!client || !client.payload || !client.payload.data) {\n    return '<div class=\"empty\"><div class=\"empty-title\">No data yet<\/div><div class=\"empty-sub\">This client hasn\\'t synced any data yet.<\/div><\/div>';\n  }\n  var data = {};\n  try { data = JSON.parse(client.payload.data.bcl_v2 || '{}'); } catch(e) {}\n  var goals = [];\n  try { goals = JSON.parse(client.payload.data.bcl_goals_v2 || '[]'); } catch(e) {}\n  var profile = {};\n  try { profile = JSON.parse(client.payload.data.bcl_profile || '{}'); } catch(e) {}\n\n  // Calculate last 7 days\n  var days  = [];\n  var today = new Date();\n  for (var i = 6; i >= 0; i--) {\n    var d = new Date(today);\n    d.setDate(today.getDate() - i);\n    days.push(d.toISOString().slice(0,10));\n  }\n\n  // Extract metrics for each day\n  function getMetric(catKey, habitId) {\n    try {\n      var catData   = data[catKey];\n      if (!catData) return days.map(function() { return 0; });\n      var habitData = catData[habitId];\n      if (!habitData) return days.map(function() { return 0; });\n      return days.map(function(ds) {\n        var v = typeof habitData === 'object' && !Array.isArray(habitData) ? habitData[ds] : null;\n        return v || 0;\n      });\n    } catch(e) { return days.map(function() { return 0; }); }\n  }\n\n  var calories = getMetric('nutrition','calories');\n  var protein  = getMetric('nutrition','protein');\n  var burned   = getMetric('exercise','burned');\n  var steps    = getMetric('exercise','steps');\n  var water    = getMetric('nutrition','water');\n  var sleep    = getMetric('lifestyle','sleep');\n  var workout  = days.map(function(ds) {\n    try { return (data.exercise && data.exercise.workout && data.exercise.workout[ds]) === true; } catch(e) { return false; }\n  });\n\n  var totalCalIn  = calories.reduce(function(a,v){return a+(+v||0);},0);\n  var totalCalOut = burned.reduce(function(a,v){return a+(+v||0);},0);\n  var totalSteps  = steps.reduce(function(a,v){return a+(+v||0);},0);\n  var avgProtein  = Math.round(protein.reduce(function(a,v){return a+(+v||0);},0) / 7);\n  var avgSleep    = (sleep.reduce(function(a,v){return a+(+v||0);},0) / 7).toFixed(1);\n  var workouts    = workout.filter(Boolean).length;\n  var weekDef     = totalCalOut - totalCalIn;\n\n  // Goals summary\n  var goalsHtml = '';\n  if (goals.length > 0) {\n    goalsHtml = '<div class=\"card\" style=\"margin-top:12px\">'\n      + '<div style=\"font-size:12px;font-weight:600;margin-bottom:12px\">Goals (' + goals.length + ')<\/div>'\n      + goals.slice(0,5).map(function(g) {\n          var pct = g.current && g.target ? Math.min(100, Math.round((g.current/g.target)*100)) : 0;\n          return '<div style=\"margin-bottom:10px\">'\n            + '<div style=\"display:flex;justify-content:space-between;margin-bottom:4px\">'\n            + '<span style=\"font-size:12px;font-weight:600\">' + g.title + '<\/span>'\n            + '<span style=\"font-size:11px;color:var(--muted)\">' + pct + '%<\/span>'\n            + '<\/div>'\n            + '<div style=\"height:5px;background:var(--faint);border-radius:3px;overflow:hidden\">'\n            + '<div style=\"height:100%;width:' + pct + '%;background:#2C2C34;border-radius:3px\"><\/div>'\n            + '<\/div><\/div>';\n        }).join('')\n      + (goals.length > 5 ? '<div style=\"font-size:11px;color:var(--muted);margin-top:4px\">+' + (goals.length-5) + ' more goals<\/div>' : '')\n      + '<\/div>';\n  }\n\n  return '<div class=\"grid-3\" style=\"margin-bottom:12px\">'\n    + statCard('Cal Deficit', (weekDef>=0?'+':'')+weekDef.toLocaleString()+' kcal', weekDef>=0?'var(--green)':'var(--red)')\n    + statCard('Workouts', workouts+' / 7', 'var(--text)')\n    + statCard('Total Steps', totalSteps.toLocaleString(), 'var(--text)')\n    + '<\/div>'\n    + '<div class=\"grid-3\" style=\"margin-bottom:12px\">'\n    + statCard('Avg Protein', avgProtein+'g / day', 'var(--text)')\n    + statCard('Avg Sleep', avgSleep+'h / night', 'var(--text)')\n    + statCard('Water (7d)', (water.reduce(function(a,v){return a+(+v||0);},0)/1000).toFixed(1)+'L total', 'var(--text)')\n    + '<\/div>'\n    // Day-by-day calorie bars\n    + '<div class=\"card\">'\n    + '<div style=\"font-size:12px;font-weight:600;margin-bottom:12px\">Daily calories this week<\/div>'\n    + '<div style=\"display:flex;align-items:flex-end;gap:4px;height:64px;margin-bottom:8px\">'\n    + calories.map(function(v, i) {\n        var val = +v || 0;\n        var pct = Math.min(100, Math.round((val/3000)*100));\n        return '<div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:3px\">'\n          + '<div style=\"width:100%;height:52px;display:flex;align-items:flex-end\">'\n          + '<div style=\"width:100%;height:' + Math.max(pct,val>0?3:0) + '%;background:' + (val>0?'#2C2C3488':'var(--faint)') + ';border-radius:3px 3px 0 0\"><\/div>'\n          + '<\/div>'\n          + '<div style=\"font-size:8px;color:var(--muted)\">' + days[i].slice(5).replace('-','/') + '<\/div>'\n          + '<\/div>';\n      }).join('')\n    + '<\/div>'\n    + '<div style=\"display:flex;justify-content:space-between;font-size:10px;color:var(--muted)\">'\n    + '<span>kcal consumed<\/span><span>max 3,000<\/span><\/div>'\n    + '<\/div>'\n    + goalsHtml;\n}\n\nfunction statCard(label, val, col) {\n  return '<div style=\"background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 16px 14px;box-shadow:var(--shadow)\">'\n    + '<div style=\"font-size:24px;font-weight:500;color:' + (col || 'var(--text)') + ';letter-spacing:-.03em;font-family:\\'Jost\\',sans-serif;line-height:1\">' + val + '<\/div>'\n    + '<div style=\"font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-top:8px\">' + label + '<\/div>'\n    + '<\/div>';\n}\n\n// \u2500\u2500 Targets Form \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderTargetsForm() {\n  var client  = getClient();\n  var profile = {};\n  try { profile = JSON.parse(client.payload.data.bcl_profile || '{}'); } catch(e) {}\n\n  return '<div class=\"card\">'\n    + '<div style=\"font-size:14px;font-weight:600;margin-bottom:4px\">Daily Targets<\/div>'\n    + '<div style=\"font-size:12px;color:var(--muted);margin-bottom:16px\">These will be pushed to the client\\'s app on next sync.<\/div>'\n    + targetInput('Steps',          'tgt_steps',    profile.tgt_steps    || 10000, 'steps/day')\n    + targetInput('Calories In',    'tgt_calories', profile.tgt_calories || 2000,  'kcal/day')\n    + targetInput('Calories Burned','tgt_burned',   profile.tgt_burned   || 500,   'kcal/day')\n    + targetInput('Protein',        'tgt_protein',  profile.tgt_protein  || 150,   'g/day')\n    + targetInput('Water',          'tgt_water',    profile.tgt_water    || 2500,  'ml/day')\n    + targetInput('Sleep',          'tgt_sleep',    profile.tgt_sleep    || 8,     'hours')\n    + '<div style=\"font-size:12px;color:var(--muted);margin-bottom:12px\">Optional message to client:<\/div>'\n    + '<textarea id=\"asg-message\" placeholder=\"e.g. Great week! Push hard on protein this week.\" rows=\"2\"'\n    + ' style=\"width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:9px;font-size:13px;resize:none;outline:none;margin-bottom:16px\"><\/textarea>'\n    + '<button onclick=\"pushTargets()\" style=\"width:100%;padding:13px;border-radius:12px;background:#B81E2A;color:#fff;font-size:14px;font-weight:500\">Push Targets to Client<\/button>'\n    + '<\/div>';\n}\n\nfunction targetInput(label, key, val, unit) {\n  return '<div class=\"form-group\">'\n    + '<label class=\"form-label\">' + label + ' <span style=\"font-weight:400;text-transform:none;letter-spacing:0;color:var(--light)\">(' + unit + ')<\/span><\/label>'\n    + '<input type=\"number\" class=\"form-input\" id=\"tgt-' + key + '\" value=\"' + val + '\">'\n    + '<\/div>';\n}\n\n\n// \u2500\u2500 Shared Drive push helper \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n// Creates or updates the client's assignments file on Drive.\n// Returns true on success, false on failure.\nasync function _pushAsgToClient(client, asg) {\n  var safe    = client.email.replace(/[^a-z0-9]/gi, '_').toLowerCase();\n  var asgName = 'bcl_' + safe + '_assignments.json';\n  var body    = JSON.stringify(asg);\n\n  // Try to find asgFileId if we don't have it cached\n  if (!client.asgFileId) {\n    try {\n      var q  = \"name='\" + asgName + \"' and '\" + GD_FOLDER_ID + \"' in parents and trashed=false\";\n      var fr = await _fetch('https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) + '&fields=files(id)');\n      if (fr.ok) {\n        var fd = await fr.json();\n        if (fd.files && fd.files.length) client.asgFileId = fd.files[0].id;\n      }\n    } catch(e) {}\n  }\n\n  var pushRes;\n  if (client.asgFileId) {\n    pushRes = await _fetch(\n      'https://www.googleapis.com/upload/drive/v3/files/' + client.asgFileId + '?uploadType=media',\n      { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: body }\n    );\n    if (!pushRes.ok) client.asgFileId = null; // stale ID \u2014 fall through to create\n  }\n\n  if (!client.asgFileId) {\n    var boundary = 'bcl_b_' + Date.now();\n    var multipart = '--' + boundary + '\\r\\n'\n      + 'Content-Type: application/json\\r\\n\\r\\n'\n      + JSON.stringify({ name: asgName, parents: [GD_FOLDER_ID], mimeType: 'application/json' })\n      + '\\r\\n--' + boundary + '\\r\\n'\n      + 'Content-Type: application/json\\r\\n\\r\\n'\n      + body\n      + '\\r\\n--' + boundary + '--';\n    pushRes = await _fetch(\n      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',\n      { method: 'POST', headers: { 'Content-Type': 'multipart/related; boundary=' + boundary }, body: multipart }\n    );\n    if (pushRes.ok) {\n      var created = await pushRes.clone().json();\n      client.asgFileId = created.id;\n    }\n  }\n\n  if (!pushRes || !pushRes.ok) {\n    var errText = pushRes ? await pushRes.text() : 'no response';\n    console.error('_pushAsgToClient failed:', pushRes && pushRes.status, errText);\n    return false;\n  }\n  return true;\n}\n\n// \u2500\u2500 Read existing assignments for a client \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nasync function _readClientAsg(client) {\n  if (!client.asgFileId) return null;\n  try {\n    var r = await _fetch('https://www.googleapis.com/drive/v3/files/' + client.asgFileId + '?alt=media');\n    if (r.ok) return await r.json();\n  } catch(e) {}\n  return null;\n}\n\nasync function pushTargets() {\n  var client = getClient();\n  if (!client) return;\n  if (Coach.demo) { showToast('Demo mode \u2014 targets not sent. Connect Google to push for real.'); return; }\n\n  var targets = {};\n  ['tgt_steps','tgt_calories','tgt_burned','tgt_protein','tgt_water','tgt_sleep'].forEach(function(k) {\n    var el = document.getElementById('tgt-' + k);\n    if (el && el.value) targets[k] = +el.value;\n  });\n  var message = (document.getElementById('asg-message') || {}).value || '';\n\n  // Read existing asg so we don't wipe routines\n  var asg = (await _readClientAsg(client)) || {};\n  asg.pushedAt = new Date().toISOString();\n  asg.targets  = targets;\n  if (message) asg.message = message;\n\n  try {\n    var ok = await _pushAsgToClient(client, asg);\n    if (ok) showToast('\\u2713 Targets pushed to ' + (client.name || client.email));\n    else    showToast('Push failed \u2014 check browser console for details');\n  } catch(e) {\n    showToast('Error: ' + (e.message || e));\n    console.error(e);\n  }\n}\n\n// \u2500\u2500 Routine Panel \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderRoutinePanel() {\n  var client   = getClient();\n  var routines = [];\n  try { routines = JSON.parse(client.payload.data.bcl_routines_v1 || '[]'); } catch(e) {}\n  var lib = getLibrary();\n\n  var existingHtml = routines.length > 0\n    ? '<div style=\"font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px\">Client\\'s Routines<\\/div>'\n      + routines.map(function(r) {\n          return '<div style=\"background:var(--faint);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px\">'\n            + '<div style=\"font-size:13px;font-weight:600\">' + r.name + '<\\/div>'\n            + '<div style=\"font-size:11px;color:var(--muted)\">' + (r.exercises ? r.exercises.length + ' exercises' : '') + '<\\/div>'\n            + '<\\/div>';\n        }).join('')\n    : '';\n\n  var libCards = lib.length === 0\n    ? '<div style=\"text-align:center;padding:30px 0;color:var(--muted);font-size:13px\">No workouts in library yet.<br>Go to the <strong>Library<\\/strong> tab to build some.<\\/div>'\n    : lib.map(function(w) {\n        var isCardio = w.type === 'cardio';\n        var badge = isCardio\n          ? '<span style=\"background:#1a6b3c;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px\">Cardio<\\/span>'\n          : '<span style=\"background:#1a3b6b;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px\">Strength<\\/span>';\n        var detail = isCardio\n          ? [(w.distance ? w.distance + 'km' : ''), (w.duration ? w.duration + 'min' : '')].filter(Boolean).join(' \u00b7 ')\n          : (w.exercises ? w.exercises.length + ' exercises' : '');\n        var weekly = w.weeklyTarget ? w.weeklyTarget + 'x\\/week' : '';\n        return '<div style=\"background:var(--faint);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px\">'\n          + '<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px\">'\n          + '<div style=\"display:flex;align-items:center;gap:8px\">' + badge\n          + '<span style=\"font-size:14px;font-weight:600\">' + w.name + '<\\/span><\\/div>'\n          + (weekly ? '<span style=\"font-size:11px;color:var(--muted)\">' + weekly + '<\\/span>' : '')\n          + '<\\/div>'\n          + (detail ? '<div style=\"font-size:12px;color:var(--muted);margin-bottom:10px\">' + detail + '<\\/div>' : '')\n          + '<button onclick=\"pushWorkoutFromLibrary(\\'' + w.id + '\\')\" style=\"width:100%;padding:10px;border-radius:10px;background:#B81E2A;color:#fff;font-size:13px;font-weight:600\">Push to ' + (client.name || client.email) + '<\\/button>'\n          + '<\\/div>';\n      }).join('');\n\n  return '<div class=\"card\">'\n    + '<div style=\"font-size:14px;font-weight:600;margin-bottom:4px\">Push a Workout<\\/div>'\n    + '<div style=\"font-size:12px;color:var(--muted);margin-bottom:16px\">Select a workout from your library to push to this client.<\\/div>'\n    + libCards\n    + (existingHtml ? '<div style=\"margin-top:16px;padding-top:16px;border-top:1px solid var(--border)\"><div style=\"font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px\">Currently Assigned<\\/div>' + existingHtml + '<\\/div>' : '')\n    + '<\\/div>';\n}\n\n// \u2500\u2500 Library helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction getLibrary() {\n  try { return JSON.parse(localStorage.getItem('bcl_coach_library') || '[]'); } catch(e) { return []; }\n}\nfunction saveLibrary(lib) {\n  localStorage.setItem('bcl_coach_library', JSON.stringify(lib));\n}\n\n// \u2500\u2500 Push workout from library to client \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nasync function pushWorkoutFromLibrary(workoutId) {\n  var client = getClient();\n  if (!client) return;\n  if (Coach.demo) { showToast('Demo mode \u2014 not sent.'); return; }\n\n  var lib = getLibrary();\n  var w = lib.find(function(x) { return x.id === workoutId; });\n  if (!w) { showToast('Workout not found'); return; }\n\n  var routine = {\n    id:           'coach-' + Date.now(),\n    name:         w.name,\n    est:          w.type === 'cardio' ? (w.duration || 45) : 45,\n    icon:         w.type === 'cardio' ? '' : '',\n    type:         w.type,\n    weeklyTarget: w.weeklyTarget || 3,\n    fromCoach:    true\n  };\n  if (w.type === 'cardio') {\n    var _cs = w.cardioSubtype || (window.CARDIO_TYPE_MAP && window.CARDIO_TYPE_MAP[w.cardioType || w.name]) || 'distance_time';\n    if (_cs === 'time') {\n      routine.exercises = [{ id: 'ex-0', name: w.cardioType || w.name,\n        type: 'time', sets: w.weeklyTarget || 3, secs: (w.duration || 0) * 60, reps: (w.duration || 0) * 60 }];\n    } else {\n      routine.exercises = [{ id: 'ex-0', name: w.cardioType || w.name,\n        type: 'distance_time', km: w.distance || 0, mins: w.duration || 0, sets: 1, reps: 1 }];\n    }\n  } else {\n    routine.exercises = (w.exercises || []).map(function(e, i) {\n      return { id: 'ex-' + i, name: e.name, sets: e.sets, reps: e.reps, kg: e.kg || 0 };\n    });\n  }\n  if (w.notes) routine.notes = w.notes;\n\n  var asg = (await _readClientAsg(client)) || {};\n  asg.pushedAt = new Date().toISOString();\n  asg.routines = asg.routines || [];\n  asg.routines.push(routine);\n\n  try {\n    var ok = await _pushAsgToClient(client, asg);\n    if (ok) showToast('\\u2713 \"' + w.name + '\" pushed to ' + (client.name || client.email));\n    else    showToast('Push failed \u2014 check browser console for details');\n  } catch(e) {\n    showToast('Error: ' + (e.message || e));\n    console.error(e);\n  }\n}\n\n// \u2500\u2500 Legacy pushRoutine (redirect users to library) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nasync function pushRoutine() {\n  showToast('Use the Library tab to create and push workouts.');\n}\n\n// \u2500\u2500 Render Library m
