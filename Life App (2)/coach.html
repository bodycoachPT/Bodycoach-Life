ion();\n}\n\n// \u2500\u2500 Workouts section \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderWorkoutsSection() {\n  var el = document.getElementById('workouts-panel');\n  if (!el) return;\n  var lib = getLibrary();\n\n  var cards = lib.length === 0\n    ? '<div style=\"text-align:center;padding:60px 20px;color:var(--muted);font-size:13px\">No workouts yet. Create your first one.<\/div>'\n    : '<div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px\">'\n      + lib.map(function(w) {\n          var isCardio = w.type === 'cardio';\n          var badge = isCardio\n            ? '<span style=\"background:#1a6b3c;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px\">Cardio<\\/span>'\n            : '<span style=\"background:#1a3b6b;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px\">Strength<\\/span>';\n          var detail = isCardio\n            ? [(w.distance ? w.distance + 'km' : ''), (w.duration ? w.duration + 'min' : '')].filter(Boolean).join(' \u00b7 ')\n            : (w.exercises ? w.exercises.length + ' exercises' : '');\n          var weekly = w.weeklyTarget ? w.weeklyTarget + 'x per week' : '';\n          return '<div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px\">'\n            + '<div style=\"display:flex;align-items:center;gap:8px;margin-bottom:6px\">'\n            + badge + '<span style=\"font-size:14px;font-weight:600\">' + w.name + '<\\/span><\\/div>'\n            + '<div style=\"font-size:12px;color:var(--muted);margin-bottom:12px\">' + [detail, weekly].filter(Boolean).join(' \u00b7 ') + '<\\/div>'\n            + (w.notes ? '<div style=\"font-size:12px;color:var(--muted);margin-bottom:12px;font-style:italic\">' + w.notes + '<\\/div>' : '')\n            + '<div style=\"display:flex;gap:8px\">'\n            + '<button onclick=\"openBulkPushModal(\\'' + w.id + '\\')\" style=\"flex:1;padding:9px;border-radius:9px;background:#B81E2A;color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer\">Push to clients &rarr;<\\/button>'\n            + '<button onclick=\"openWorkoutBuilder(\\'' + w.id + '\\')\" style=\"padding:9px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;cursor:pointer\">Edit<\\/button>'\n            + '<button onclick=\"deleteFromLibrary(\\'' + w.id + '\\')\" style=\"padding:9px 14px;border-radius:9px;border:none;background:#fee2e2;color:#b91c1c;font-size:12px;font-weight:600;cursor:pointer\">Delete<\\/button>'\n            + '<\\/div><\\/div>';\n        }).join('')\n      + '<\\/div>';\n\n  el.innerHTML = '<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\">'\n    + '<div><div style=\"font-size:18px;font-weight:600\">Workout Library<\\/div>'\n    + '<div style=\"font-size:12px;color:var(--muted);margin-top:2px\">' + lib.length + ' workout' + (lib.length !== 1 ? 's' : '') + ' saved<\\/div><\\/div>'\n    + '<button onclick=\"openWorkoutBuilder(null)\" style=\"padding:10px 20px;border-radius:11px;background:#B81E2A;color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer\">+ New Workout<\\/button>'\n    + '<\\/div>'\n    + cards;\n}\n\n// \u2500\u2500 Bulk push modal \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction openBulkPushModal(workoutId) {\n  var lib = getLibrary();\n  var w = lib.find(function(x) { return x.id === workoutId; });\n  if (!w) return;\n\n  var clientRows = Coach.clients.map(function(c) {\n    return '<label style=\"display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;transition:background .15s\" onmouseover=\"this.style.background=\\'var(--faint)\\'\" onmouseout=\"this.style.background=\\'\\'\">'\n      + '<input type=\"checkbox\" class=\"bulk-push-cb\" value=\"' + c.email + '\" style=\"width:16px;height:16px;accent-color:#B81E2A;cursor:pointer\">'\n      + '<div><div style=\"font-size:13px;font-weight:600\">' + (c.name || c.email) + '<\\/div>'\n      + '<div style=\"font-size:11px;color:var(--muted)\">' + c.email + '<\\/div><\\/div>'\n      + '<\\/label>';\n  }).join('');\n\n  var isCardio = w.type === 'cardio';\n  var detail = isCardio\n    ? [(w.distance ? w.distance + 'km' : ''), (w.duration ? w.duration + 'min' : '')].filter(Boolean).join(' \u00b7 ')\n    : (w.exercises ? w.exercises.length + ' exercises' : '');\n\n  var html = '<div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px\">'\n    + '<div style=\"font-size:16px;font-weight:700\">Push Workout<\\/div><\\/div>'\n    + '<div style=\"background:var(--faint);border-radius:10px;padding:10px 14px;margin-bottom:16px\">'\n    + '<div style=\"font-size:14px;font-weight:600\">' + w.name + '<\\/div>'\n    + '<div style=\"font-size:12px;color:var(--muted);margin-top:2px\">' + [detail, w.weeklyTarget ? w.weeklyTarget + 'x\\/week' : ''].filter(Boolean).join(' \u00b7 ') + '<\\/div>'\n    + '<\\/div>'\n    + '<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px\">'\n    + '<div style=\"font-size:13px;font-weight:600\">Select clients (' + Coach.clients.length + ' total)<\\/div>'\n    + '<label style=\"font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px\">'\n    + '<input type=\"checkbox\" id=\"bulk-push-all\" onchange=\"bulkCheckAll(\\'bulk-push-cb\\',this.checked)\" style=\"accent-color:#B81E2A\"> Select all<\\/label>'\n    + '<\\/div>'\n    + '<div style=\"max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:11px;padding:4px;margin-bottom:16px\">'\n    + clientRows + '<\\/div>'\n    + '<div style=\"display:flex;gap:10px\">'\n    + '<button onclick=\"closeModal()\" style=\"flex:1;padding:12px;border-radius:11px;border:1px solid var(--border);background:transparent;font-size:14px;font-weight:600;cursor:pointer\">Cancel<\\/button>'\n    + '<button onclick=\"executeBulkPush(\\'' + workoutId + '\\')\" style=\"flex:2;padding:12px;border-radius:11px;background:#B81E2A;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer\">Push to Selected<\\/button>'\n    + '<\\/div>';\n\n  document.getElementById('modal-content').innerHTML = html;\n  document.getElementById('modal-backdrop').classList.add('open');\n}\n\nfunction bulkCheckAll(cls, checked) {\n  document.querySelectorAll('.' + cls).forEach(function(cb) { cb.checked = checked; });\n}\n\nasync function executeBulkPush(workoutId) {\n  var lib = getLibrary();\n  var w = lib.find(function(x) { return x.id === workoutId; });\n  if (!w) return;\n  var selected = Array.from(document.querySelectorAll('.bulk-push-cb:checked')).map(function(cb) { return cb.value; });\n  if (selected.length === 0) { showToast('Select at least one client'); return; }\n  if (Coach.demo) { closeModal(); showToast('Demo mode \u2014 not sent. Connect Google to push for real.'); return; }\n\n  closeModal();\n  showToast('Pushing to ' + selected.length + ' client' + (selected.length !== 1 ? 's' : '') + '...');\n\n  var ok = 0, fail = 0;\n  for (var i = 0; i < selected.length; i++) {\n    var client = Coach.clients.find(function(c) { return c.email === selected[i]; });\n    if (!client) continue;\n    var routine = {\n      id: 'coach-' + Date.now() + '-' + i, name: w.name,\n      est: w.type === 'cardio' ? (w.duration || 45) : 45,\n      icon: '', type: w.type, weeklyTarget: w.weeklyTarget || 3, fromCoach: true\n    };\n    if (w.type === 'cardio') {\n      var _csubtype = w.cardioSubtype || (window.CARDIO_TYPE_MAP && window.CARDIO_TYPE_MAP[w.cardioType || w.name]) || 'distance_time';\n      if (_csubtype === 'time') {\n        routine.exercises = [{ id: 'ex-0', name: w.cardioType || w.name,\n          type: 'time', sets: w.weeklyTarget || 3, secs: (w.duration || 0) * 60, reps: (w.duration || 0) * 60 }];\n      } else {\n        routine.exercises = [{ id: 'ex-0', name: w.cardioType || w.name,\n          type: 'distance_time', km: w.distance || 0, mins: w.duration || 0, sets: 1, reps: 1 }];\n      }\n    } else {\n      routine.exercises = (w.exercises || []).map(function(e, idx) {\n        return { id: 'ex-' + idx, name: e.name, sets: e.sets, reps: e.reps, kg: e.kg || 0 };\n      });\n    }\n    if (w.notes) routine.notes = w.notes;\n    try {\n      var existing = null;\n      if (client.asgFileId) {\n        var er = await _fetch('https://www.googleapis.com/drive/v3/files/' + client.asgFileId + '?alt=media');\n        if (er.ok) existing = await er.json();\n      }\n      var asg = existing || {};\n      asg.pushedAt = new Date().toISOString();\n      asg.routines = asg.routines || [];\n      asg.routines.push(routine);\n      var safe = client.email.replace(/[^a-z0-9]/gi, '_').toLowerCase();\n      var body = JSON.stringify(asg);\n      if (client.asgFileId) {\n        await _fetch('https://www.googleapis.com/upload/drive/v3/files/' + client.asgFileId + '?uploadType=media', {\n          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: body\n        });\n      } else {\n        var meta = { name: 'bcl_' + safe + '_assignments.json', parents: [GD_FOLDER_ID], mimeType: 'application/json' };\n        var cr = await _fetch('https://www.googleapis.com/drive/v3/files', {\n          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(meta)\n        });\n        var created = await cr.json();\n        client.asgFileId = created.id;\n        await _fetch('https://www.googleapis.com/upload/drive/v3/files/' + created.id + '?uploadType=media', {\n          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: body\n        });\n      }\n      ok++;\n    } catch(e) { console.error('Bulk push error for', client.email, e); fail++; }\n  }\n  showToast('\"' + w.name + '\" pushed to ' + ok + ' client' + (ok !== 1 ? 's' : '') + (fail ? ' \u00b7 ' + fail + ' failed' : ''));\n}\n\n// \u2500\u2500 Messages section \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderMessagesSection() {\n  var el = document.getElementById('messages-panel');\n  if (!el) return;\n\n  var clientRows = Coach.clients.map(function(c) {\n    return '<label style=\"display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer\" onmouseover=\"this.style.background=\\'var(--faint)\\'\" onmouseout=\"this.style.background=\\'\\'\">'\n      + '<input type=\"checkbox\" class=\"bulk-msg-cb\" value=\"' + c.email + '\" style=\"width:16px;height:16px;accent-color:#B81E2A;cursor:pointer\">'\n      + '<div><div style=\"font-size:13px;font-weight:600\">' + (c.name || c.email) + '<\\/div>'\n      + '<div style=\"font-size:11px;color:var(--muted)\">' + c.email + '<\\/div><\\/div>'\n      + '<\\/label>';\n  }).join('');\n\n  el.innerHTML = '<div style=\"display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start\">'\n    + '<div class=\"card\">'\n    + '<div style=\"font-size:16px;font-weight:600;margin-bottom:4px\">Send a Message<\\/div>'\n    + '<div style=\"font-size:12px;color:var(--muted);margin-bottom:16px\">Message will appear as a banner in the client app on next open. It stays visible until they dismiss it.<\\/div>'\n    + '<div class=\"form-group\"><label class=\"form-label\">Message<\\/label>'\n    + '<textarea id=\"bulk-msg-text\" class=\"form-input\" rows=\"5\" style=\"resize:vertical\" placeholder=\"e.g. Great progress this week! Push hard on protein intake \u2014 aim for 160g daily.\"><\\/textarea><\\/div>'\n    + '<button onclick=\"executeBulkMessage()\" style=\"width:100%;padding:13px;border-radius:12px;background:#B81E2A;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer\">Send to Selected Clients<\\/button>'\n    + '<\\/div>'\n    + '<div class=\"card\">'\n    + '<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">'\n    + '<div style=\"font-size:14px;font-weight:600\">Clients<\\/div>'\n    + '<label style=\"font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px\">'\n    + '<input type=\"checkbox\" id=\"msg-select-all\" onchange=\"bulkCheckAll(\\'bulk-msg-cb\\',this.checked)\" style=\"accent-color:#B81E2A\"> All<\\/label>'\n    + '<\\/div>'\n    + '<div style=\"max-height:420px;overflow-y:auto\">' + clientRows + '<\\/div>'\n    + '<\\/div>'\n    + '<\\/div>';\n}\n\nasync function executeBulkMessage() {\n  var msg = (document.getElementById('bulk-msg-text') || {}).value || '';\n  if (!msg.trim()) { showToast('Please enter a message'); return; }\n  var selected = Array.from(document.querySelectorAll('.bulk-msg-cb:checked')).map(function(cb) { return cb.value; });\n  if (selected.length === 0) { showToast('Select at least one client'); return; }\n  if (Coach.demo) { showToast('Demo mode \u2014 not sent. Connect Google to push for real.'); return; }\n\n  showToast('Sending to ' + selected.length + ' client' + (selected.length !== 1 ? 's' : '') + '...');\n  var ok = 0, fail = 0;\n  for (var i = 0; i < selected.length; i++) {\n    var client = Coach.clients.find(function(c) { return c.email === selected[i]; });\n    if (!client) continue;\n    try {\n      var existing = null;\n      if (client.asgFileId) {\n        var er = await _fetch('https://www.googleapis.com/drive/v3/files/' + client.asgFileId + '?alt=media');\n        if (er.ok) existing = await er.json();\n      }\n      var asg = existing || {};\n      asg.message   = msg.trim();\n      asg.pushedAt  = new Date().toISOString();\n      var safe = client.email.replace(/[^a-z0-9]/gi, '_').toLowerCase();\n      var body = JSON.stringify(asg);\n      if (client.asgFileId) {\n        await _fetch('https://www.googleapis.com/upload/drive/v3/files/' + client.asgFileId + '?uploadType=media', {\n          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: body\n        });\n      } else {\n        var meta = { name: 'bcl_' + safe + '_assignments.json', parents: [GD_FOLDER_ID], mimeType: 'application/json' };\n        var cr = await _fetch('https://www.googleapis.com/drive/v3/files', {\n          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(meta)\n        });\n        var created = await cr.json();\n        client.asgFileId = created.id;\n        await _fetch('https://www.googleapis.com/upload/drive/v3/files/' + created.id + '?uploadType=media', {\n          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: body\n        });\n      }\n      ok++;\n    } catch(e) { console.error('Bulk msg error for', client.email, e); fail++; }\n  }\n  showToast('Sent to ' + ok + ' client' + (ok !== 1 ? 's' : '') + (fail ? ' \u00b7 ' + fail + ' failed' : ''));\n  if (ok > 0 && document.getElementById('bulk-msg-text')) {\n    document.getElementById('bulk-msg-text').value = '';\n    document.querySelectorAll('.bulk-msg-cb').forEach(function(cb) { cb.checked = false; });\n    var all = document.getElementById('msg-select-all');\n    if (all) all.checked = false;\n  }\n}\n\n// \u2500\u2500 Notes panel (coach private notes per client) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction _noteKey(client, type) {\n  return 'bcl_coach_' + type + '_' + client.email.replace(/[^a-z0-9]/gi, '_').toLowerCase();\n}\n\nfunction renderNotesPanel() {\n  var client = getClient();\n  var notes  = localStorage.getItem(_noteKey(client, 'notes')) || '';\n  return '<div class=\"card\">'\n    + '<div style=\"font-size:14px;font-weight:600;margin-bottom:4px\">Private Notes<\\/div>'\n    + '<div style=\"font-size:12px;color:var(--muted);margin-bottom:14px\">Visible to you only. Not shared with the client. Saves automatically.<\\/div>'\n    + '<textarea id=\"coach-notes-ta\" class=\"form-input\" rows=\"12\" style=\"resize:vertical;width:100%\" placeholder=\"Training history, personality notes, what motivates them, exercise preferences...\" oninput=\"saveNote(\\'notes\\')\">' + notes.replace(/<\/g, '&lt;') + '<\\/textarea>'\n    + '<\\/div>';\n}\n\nfunction renderMedicalPanel() {\n  var client  = getClient();\n  var medical = localStorage.getItem(_noteKey(client, 'medical')) || '';\n  return '<div class=\"card\">'\n    + '<div style=\"font-size:14px;font-weight:600;margin-bottom:4px\">Medical Notes<\\/div>'\n    + '<div style=\"font-size:12px;color:var(--muted);margin-bottom:14px\">Injuries, conditions, medications, contraindications. Visible to you only. Saves automatically.<\\/div>'\n    + '<textarea id=\"coach-medical-ta\" class=\"form-input\" rows=\"12\" style=\"resize:vertical;width:100%\" placeholder=\"Previous injuries, current conditions, medications, movements to avoid...\" oninput=\"saveNote(\\'medical\\')\">' + medical.replace(/<\/g, '&lt;') + '<\\/textarea>'\n    + '<\\/div>';\n}\n\nfunction saveNote(type) {\n  var client = getClient();\n  if (!client) return;\n  var ta = document.getElementById('coach-' + type + '-ta');\n  if (!ta) return;\n  localStorage.setItem(_noteKey(client, type), ta.value);\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// UTILS\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction _relativeTime(iso) {\n  if (!iso) return 'never';\n  var diff = Date.now() - new Date(iso).getTime();\n  var mins = Math.floor(diff / 60000);\n  if (mins < 2)   return 'just now';\n  if (mins < 60)  return mins + 'm ago';\n  var hrs = Math.floor(mins/60);\n  if (hrs < 24)   return hrs + 'h ago';\n  return Math.floor(hrs/24) + 'd ago';\n}\n\nfunction closeModal() {\n  document.getElementById('modal-backdrop').classList.remove('open');\n}\n\nvar _toastTimer;\nfunction showToast(msg) {\n  var el = document.getElementById('toast');\n  if (!el) return;\n  el.textContent = msg;\n  el.style.display = 'block';\n  clearTimeout(_toastTimer);\n  _toastTimer = setTimeout(function() { el.style.display = 'none'; }, 4000);\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
